<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CV</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="cv">
    <header class="cv-header">
      <h1>Your Name</h1>
      <p class="tagline">Your Title</p>
      <div class="contact">
        <span>email@example.com</span>
        <span>Location</span>
      </div>
    </header>

    <section class="section">
      <h2>About</h2>
      <p>Placeholder — content coming soon.</p>
    </section>

    <section class="section">
      <h2>Experience</h2>
      <div class="entry">
        <h3>Role <span class="meta">Company &middot; 2020–Present</span></h3>
        <p>Description of work.</p>
      </div>
    </section>

    <section class="section">
      <h2>Education</h2>
      <div class="entry">
        <h3>Degree <span class="meta">Institution &middot; Year</span></h3>
      </div>
    </section>

    <section class="section">
      <h2>Skills</h2>
      <p>Placeholder skills list.</p>
    </section>
  </main>
</body>
</html>
